name: dove

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    ports:
      - 8180:80
    environment:
      - BACKEND_URL=/backend
      - IMAGES_URL=/images
    volumes:
      - ./logs/nginx:/var/log/nginx/
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    ports:
      - 8181:8080
    environment:
      DEPS_DB_URL: database:5432
      DEPS_DB_DBNAME: dove
      DEPS_DB_PASSWORD: dove
      DEPS_DB_USERNAME: dove
      APP_PICTURES_DIR: /data
      LOGGING_FILE_NAME: /logs/backend.log
    volumes:
      - ./data/images:/data
      - ./logs/backend:/logs
    depends_on:
      database:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

  database:
    build:
      context: ./database/
      dockerfile: ./Dockerfile
    expose:
      - 5432
    environment:
      LANG: it_IT.utf8
      POSTGRES_DB: dove
      POSTGRES_USER: dove
      POSTGRES_PASSWORD: dove
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=it_IT.utf8"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dove"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - ./database/init:/docker-entrypoint-initdb.d:ro

  flyway:
    image: flyway/flyway:11
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./flyway/sql:/flyway/sql:ro
    command: >
      -url=jdbc:postgresql://database:5432/dove
      -user=dove
      -password=dove
      -baselineOnMigrate=true
      migrate